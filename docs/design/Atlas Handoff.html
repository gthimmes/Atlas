<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Atlas — Handoff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../src/tokens.css" />
  <link rel="stylesheet" href="src/lofi.css" />
  <style>
    html, body, #root { height: 100%; }
    body { background: var(--bg-0); }
    /* Each canvas artboard hosts a stand-alone design frame */
    .surface-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg-0);
      color: var(--fg-0);
    }
  </style>
</head>
<body class="theme-dark">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="src/lofi-pitch.jsx"></script>
  <script type="text/babel" src="src/lofi-artifact.jsx"></script>
  <script type="text/babel" src="src/lofi-states.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;
    const { LoFiPitch, LoFiArtifact, LoFiStates } = window;

    const App = () => (
      <DesignCanvas
        title="Atlas — handoff surfaces"
        subtitle="Low-fi for unbuilt P0/P1 surfaces + empty/error/loading states for built surfaces."
      >
        <DCSection id="lofi" title="Unbuilt surfaces — low-fi">
          <DCArtboard id="pitch" label="Pitch Shaping" width={1200} height={760}>
            <div className="surface-shell"><LoFiPitch /></div>
          </DCArtboard>
          <DCArtboard id="artifact" label="Living Artifact" width={1200} height={760}>
            <div className="surface-shell"><LoFiArtifact /></div>
          </DCArtboard>
        </DCSection>

        <DCSection id="wg-states" title="Work Graph — states">
          <DCArtboard id="wg-states-abd" label="Empty / Loading / Error" width={1320} height={520}>
            <LoFiStates.WGStates />
          </DCArtboard>
        </DCSection>

        <DCSection id="se-states" title="Spec Editor — states">
          <DCArtboard id="se-states-abd" label="Gated / Failing / Stale bundle" width={1320} height={560}>
            <LoFiStates.SEStates />
          </DCArtboard>
        </DCSection>

        <DCSection id="ar-states" title="Agent Run — states">
          <DCArtboard id="ar-states-abd" label="Elicit / Error / Stale" width={1320} height={560}>
            <LoFiStates.ARStates />
          </DCArtboard>
        </DCSection>

        <DCSection id="dg-states" title="Digest — states">
          <DCArtboard id="dg-states-abd" label="Quiet / Red-risk override / Regenerating" width={1320} height={520}>
            <LoFiStates.DGStates />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
