services:
  db:
    image: postgres:16-alpine
    container_name: atlas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - '5433:5432'
    volumes:
      - atlas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atlas -d atlas']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  atlas-pgdata:
