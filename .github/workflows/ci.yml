name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run codegen:check
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run format:check
      - run: dotnet format Atlas.sln --verify-no-changes

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: dotnet test Atlas.sln --filter Category=Unit --nologo

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test Atlas.sln --filter Category=Integration --nologo

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @atlas/e2e exec playwright install --with-deps
      - run: pnpm run e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/e2e/test-results/
          retention-days: 14
